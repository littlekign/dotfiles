# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-k
bind-key C-k send-prefix

# split window
bind | split-window -h
bind - split-window -v

# move between windows
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# reorder windows
bind -r < swap-window -t -1\; select-window -t -1
bind -r > swap-window -t +1\; select-window -t +1

# reload config file
bind r source-file ~/.tmux.conf

# vim bindings
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -in -selection clipboard'
bind Z run-shell "~/.config/tmux/plugins/zen/tmux-zen.sh 160"

set-option -g allow-rename off
set-window-option -g automatic-rename off
set -g status-interval 5

# Make the status line pretty and add some modules
set -g status-right-length 80
set -g status-left "#{?window_zoomed_flag,[Z],}"
set -g status-right ""
# set -ag status-right "#{E:@catppuccin_status_date_time}"
set -g @catppuccin_gitmux_text "#(gitmux -cfg $HOME/.gitmux.conf \"#{pane_current_path}\")"
set -ag status-right "#{E:@catppuccin_status_gitmux} #{E:@catppuccin_status_date_time}"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'loctvl842/monokai-pro.tmux'
set -g @plugin 'tmux-plugins/tmux-open'

# Open org/repo#123 references as GitHub PR URLs (cursor anywhere on the ref)
bind-key -T copy-mode-vi O run-shell "~/.config/tmux/open-gh-ref.sh"

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Highlight windows in status bar when a bell rings
set -g monitor-bell on
set -g visual-bell off
set -g bell-action other

# Apply after TPM so theme plugin doesn't override
set -g pane-border-indicators colour
set -g pane-border-lines heavy
set -g pane-border-status top
set -g pane-border-format " #{pane_current_command} "
# Clear theme's bell style so our inline conditional works
setw -g window-status-bell-style ""
# Bell indicator: window number pill turns blue on bell
setw -g window-status-format " #[fg=#{?window_bell_flag,#78dce8,#939293},bg=#19181a,nobold,nounderscore,noitalics]#[fg=#19181a,bg=#{?window_bell_flag,#78dce8,#939293},bold]#I#[fg=#{?window_bell_flag,#78dce8,#939293},bg=#221f22,nobold,nounderscore,noitalics]#[fg=#{?window_bell_flag,#78dce8,#939293},bg=#221f22] #W #[fg=#221f22,bg=#19181a]"
